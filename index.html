<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>最短ルートで作る音楽生成AIアプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        input { width: 300px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status { margin: 20px; color: #666; }
    </style>
</head>
<body>

    <h1>AI作曲ジュークボックス</h1>
    <p>どんな曲を作りたいか英語で入力してね（例: "Lo-fi hip hop beat for studying", "Heavy metal guitar solo"）</p>
    
    <input type="text" id="prompt" value="Upbeat pop song with synth and acoustic guitar">
    <button id="generateBtn">曲を生成する</button>

    <div id="status"></div>
    <div id="audioContainer"></div>

    <script>
        // ★ここにCloudflare WorkersのURLを貼り付けてください（最後に / は不要です）
        const WORKER_URL = "https://tight-glade-fd43.mir-boy-20120508.workers.dev"; 

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const promptText = document.getElementById('prompt').value;
            const statusDiv = document.getElementById('status');
            const audioContainer = document.getElementById('audioContainer');
            
            statusDiv.innerText = "iPadからクラウド経由でAIにリクエスト中...";
            audioContainer.innerHTML = "";

            try {
                // 1. あなたの安全なCloudflare Workers（中継サーバー）に曲の作成を依頼
                const response = await fetch(`${WORKER_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });

                let data = await response.json();
                const predictionId = data.id;

                // 2. AIの計算が終わるまで、数秒おきにCloudflare経由で「できた？」とチェックする
                while (data.status !== 'succeeded' && data.status !== 'failed') {
                    await new Promise(resolve => setTimeout(resolve, 3000)); // 3秒待つ
                    
                    const checkRes = await fetch(`${WORKER_URL}/api/status/${predictionId}`);
                    data = await checkRes.json();
                    statusDiv.innerText = `現在の状態: ${data.status}...`;
                }

                // 3. 完成したらMP3を画面に出して鳴らす！
                if (data.status === 'succeeded') {
                    statusDiv.innerText = "完成しました！";
                    const audioUrl = data.output; // AIが作った音ファイルのURL
                    audioContainer.innerHTML = `<audio controls src="${audioUrl}"></audio>`;
                } else {
                    statusDiv.innerText = "生成に失敗しました。";
                }

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "エラーが発生しました。コンソールを確認してください。";
            }
        });
    </script>
</body>
</html>
